# Atrium nginx site config for theatrium.online.
#
# Install:
#   sudo cp nginx/atrium.conf /etc/nginx/sites-available/theatrium.online.conf
#   sudo ln -sf /etc/nginx/sites-available/theatrium.online.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS certificate is obtained via certbot:
#   sudo certbot --nginx -d theatrium.online
# certbot will auto-edit this file to point at /etc/letsencrypt/live/... paths.
# If you prefer webroot mode or want to keep this file unmodified, request the
# cert separately and hand-edit the ssl_certificate paths below.

upstream atrium_phoenix {
    server 127.0.0.1:4100;
}

server {
    listen 80;
    listen [::]:80;
    server_name theatrium.online admin.theatrium.online mcl.theatrium.online alldoq.theatrium.online;

    access_log /var/log/nginx/atrium_access.log;
    error_log  /var/log/nginx/atrium_error.log;

    # Allow 200 MB request bodies (double the 100 MB file-doc cap for headroom)
    client_max_body_size 200M;
    client_body_buffer_size 256k;
    client_body_timeout 600s;
    send_timeout 600s;

    # Certbot writes its ACME challenge here before issuing a cert.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri =404;
    }

    # Health endpoint (no proxy log noise)
    location = /health {
        proxy_pass http://atrium_phoenix;
        access_log off;
    }

    # Document inline images are served directly from the shared uploads dir.
    # Encrypted files (/uploads/documents/*/files/...) intentionally fall through
    # to Phoenix, where the StaticUploads plug 404s them.
    location ~ ^/uploads/documents/[^/]+/images/ {
        root /home/user/atrium/shared;
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Main reverse proxy (WebSocket + LiveView upgrade)
    location / {
        proxy_pass http://atrium_phoenix;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_connect_timeout 300s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        proxy_request_buffering off;
        proxy_buffering off;
    }
}

